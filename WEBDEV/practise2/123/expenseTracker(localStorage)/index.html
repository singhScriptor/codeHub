<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>expense-tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-div container-fluid bg-info p-2">
        <h1 class="header text-white text-center fw-bolder">Expense-Tracker</h1>
    </div>
    <div class="main container d-flex flex-lg-row flex-sm-column">
        <form class="form shadow-lg p-3 w-50 m-2 rounded ">
            <label for="name" class="form-label">Expense-Name :</label>
            <input type="text" class="name form-control m-2 p-2" name="name" required>
            <label for="price" class="form-label">Expense-Price :</label>
            <input type="number" class="price form-control m-2 p-2" name="price" required>
            <div class="d-flex justify-content-end">
                <select name="category" class="category form-control m-3 w-50 p-2" required>
                    <option value="select">select</option>
                    <option value="grcoery">grocery</option>
                    <option value="medical">medical</option>
                    <option value="travel">travel</option>
                    <option value="shopping">shopping</option>
                    <option value="household">household</option>
                    <option value="health">health</option>
                </select>
            </div>
            <button type="submit" class="submit bg-success p-3 w-50 m-2 border-0 text-white rounded">Add-expense</button>
        </form>
        <div class="user-div shadow-lg m-2 p-3 rounded  overflow-auto" style="max-height: 400px;  width: 50%;">
            <ul></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
