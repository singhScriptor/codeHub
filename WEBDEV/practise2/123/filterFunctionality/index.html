<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filter functionality</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <div class="header">
            <h1>Fruit Shop</h1>
            <input type="text" placeholder="search fruits" name="search">
        </div>
        <div class="div">
            <h3>Add Fruits</h3><br>
            <input type="text" name="fruit" required>
            <button type="submit">Add</button>
            <ul>
                <li>Banana</li>
                <li>Apple</li>
                <li>Orange</li>
                <li>Kiwi</li>
            </ul>
        </div>
    </form>
    <script src="script.js"></script>
</body>
</html>
