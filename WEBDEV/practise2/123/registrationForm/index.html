<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registration Form</title>
</head>
<body>
    <form>
        <div>
            <h1>Book a call</h1>
            <p>Book a call slot and our reprensetative will call you within 1hr of selected time.</p>
            <hr>
            <label for="name">Name:</label><br>
            <input type="text" name="name" required><br>
            <label for="email">Email:</label><br>
            <input type="email" name="email" required><br>
            <label for="phone">Phone:</label><br>
            <input type="tel" name="phone" required><br>
            <label for="call">Time for Call:</label><br>
            <input type="date" name="date" class="date" required>
            <input type="time" name="time" class="time" required><br>
            <button type="submit">GET A CALL</button>
        </div>
    </form>
    <script src="script.js"></script>
</body>
</html>
