<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense_Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid border border-2 border-info p-1 rounded">
        <h1 class="text-white text-center fw-bolder fst-italic">Track Your Expenses</h1>
    </div>
    <div class="container d-flex flex-lg-row flex-column stext-white p-1 m-2 ">
        <main class="main border border-2 rounded p-4  m-2 text-white flex-fill ">
            <form>
                <div class="header2 text-center">
                    <h2 class="text-info fw-bold">Add Expense</h2>
                </div>
                <div>
                    <label for="name"class="name form-label">Expense-Name:</label>
                    <input type="text"class="form-control" name="name" required>
                    <label for="price" class="price form-label">Expense-Price:</label>
                </div>
                <div class="d-flex">
                    <input type="text" class="price form-control w-50 me-2" name="price" required>
                    <select name="category" class="category form-control d-flex ms-auto w-25 bg-info border-0 p-2 rounded text-center text-white" required> 
                        <option value="" hidden>Select-Category</option>
                        <option value="medicine">Medicine</option>
                        <option value="shopping">Shopping</option>
                        <option value="utility">Utility</option>
                        <option value="travel">Travel</option>
                        <option value="grocery">Grocery</option>
                    </select>
                </div>
                <div>
                    <label for="description" class="form-label">Description:</label>
                    <textarea name="description" class="form-control w-50" required></textarea>
                </div>
                <div class="d-flex justify-content-center">
                    <button type="submit"class="submit form-control w-50 p-3 mt-2 bg-black text-warning fw-bold">Submit</button>
                </div>
            </form>
        </main>
        <aside class="aside border border-2 rounded p-4  m-2 border-white  flex-fill">
            <div class="header3 text-center">
                <h2 class="text-primary m-1 fw-bold">Expense-Details</h2>
            </div>
            <div class=" text-white" >
                <ul class="" style="max-height: 300px; overflow-y: scroll;"></ul>
            </div>
        </aside>
    </div>
    <!-- Latest version of Axios from jsDelivr -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
