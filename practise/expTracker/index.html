<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense-Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <div class="container-fluid header bg-info text-center p-2 text-white">
        <h1 class="fw-bolder fst-italic">Expense-Tracker</h1>
    </div>
    <div class="container expense-tracker d-flex flex-column  flex-lg-row flex-sm-column">
        <form class="container " >
        <div class=" shadow-lg p-3 m-2  rounded ">
            <div class="bg-primary container-fluid text-white text-center p-1 rounded">
                <h2>Add-Expense</h2>
            </div>
            <div class=" p-2 mt-2">
                <label for="name" class="form-label">Expense-Name :</label>
                <input type="text" class="name form-control" name="name" required>
            </div>
            <label for="price" class="form-label">Expense-Price :</label>
            <div class=" d-flex p-2 mb-3">
                <input type="number" class="price form-control w-50 " name="price" required>
                <select name="category" class="category form-control w-25 ms-auto p-2" required>
                    <option value="select">__select__</option>
                    <option value="shopping">shopping</option>
                    <option value="travel">Travel</option>
                    <option value="grocery">Grocery</option>
                    <option value="medicine">Medicine</option>
                </select>
            </div>
            <button class="submit form-control mt-2 p-3 bg-success text-white fw-bold w-50">Submit-Expense</button>
        </div>
        </form>
        <aside class="container">
        <div class=" shadow-lg m-2 p-3 rounded ms-auto">
            <div class="bg-secondary p-2 text-center text-white rounded">
                <h2>Expense-details</h2>
            </div>
            <div class="overflow-y-auto" style="max-height: 250px;">
                <ul></ul>
            </div>

        </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
